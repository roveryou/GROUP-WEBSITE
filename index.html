<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRIEND GROUP</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

html,body{
    background:#000;
    color:#fff;
    min-height:100vh;
    overflow-x:hidden;
    scroll-behavior:smooth;
}

.bg{
    position:fixed;
    inset:0;
    z-index:-3;
    background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.08), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(255,255,255,.05), transparent 45%),
        #000;
}

.lightning{
    position:fixed;
    inset:0;
    background:#fff;
    opacity:0;
    pointer-events:none;
    z-index:-1;
    mix-blend-mode:screen;
    animation: flash 9s infinite;
}
@keyframes flash{
    0%, 92%, 100% { opacity:0; }
    93% { opacity:.35; }
    94% { opacity:0; }
    95% { opacity:.6; }
    96% { opacity:.1; }
    97% { opacity:.45; }
    98% { opacity:0; }
}

.grid-layer{
    position:fixed;
    inset:0;
    z-index:-2;
    background-image:
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
    -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
    animation: gridMove 30s linear infinite;
}
@keyframes gridMove{
    from{ background-position: 0 0, 0 0; }
    to{ background-position: 60px 60px, 60px 60px; }
}

.particles{
    position:fixed;
    inset:0;
    z-index:-1;
    pointer-events:none;
    overflow:hidden;
}

#enter{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.96);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:99999;
    cursor:pointer;
    transition:opacity .8s ease;
}
#enter h1{
    color:#fff;
    letter-spacing:8px;
    font-size:1.6rem;
    font-weight:700;
    animation: pulse 2s infinite;
}
#enter p{
    margin-top:14px;
    color:rgba(255,255,255,.4);
    letter-spacing:4px;
    font-size:.75rem;
}
@keyframes pulse{
    0%,100%{ opacity:1; text-shadow:0 0 15px rgba(255,255,255,.6); }
    50%{ opacity:.55; text-shadow:0 0 30px rgba(255,255,255,.9); }
}

.blurred{
    filter:blur(20px);
    pointer-events:none;
}

.container{
    max-width:900px;
    margin:auto;
    padding:80px 20px 60px;
    text-align:center;
    position:relative;
    z-index:1;
}

.title{
    font-size:clamp(2.5rem, 7vw, 5rem);
    font-weight:900;
    letter-spacing:12px;
    color:#fff;
    text-shadow:
        0 0 20px rgba(255,255,255,.4),
        0 0 40px rgba(255,255,255,.2);
    animation: titleGlow 4s ease-in-out infinite;
    margin-bottom:20px;
}
@keyframes titleGlow{
    0%,100%{ text-shadow: 0 0 20px rgba(255,255,255,.4), 0 0 40px rgba(255,255,255,.2); }
    50%{ text-shadow: 0 0 30px rgba(255,255,255,.7), 0 0 60px rgba(255,255,255,.35); }
}

/* ===== FLIP CARD STYLES ===== */
.card-container{
    perspective: 1200px;
    margin-top:22px;
}

.card-flipper{
    position:relative;
    width:100%;
    min-height:140px;
    transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    transform-style: preserve-3d;
}
.card-flipper.flipped{
    transform: rotateY(180deg);
}

.card-face{
    position:relative;
    width:100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius:18px;
    padding:24px;
    text-align:left;
    background:rgba(255,255,255,.025);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter: blur(10px);
    overflow:hidden;
    transition: border-color .4s ease, box-shadow .4s ease;
}
.card-face::before{
    content:"";
    position:absolute;
    top:0; left:-100%;
    width:100%; height:100%;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,.06), transparent);
    transition:left .8s;
}
.card-face:hover::before{
    left:100%;
}
.card-face:hover{
    border-color:rgba(255,255,255,.3);
    box-shadow:0 20px 40px rgba(0,0,0,.6), 0 0 30px rgba(255,255,255,.05);
}

/* Vorderseite & Rückseite */
.card-front{
    z-index:2;
}
.card-back{
    position:absolute;
    top:0; left:0;
    height:100%;
    transform: rotateY(180deg);
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    gap:14px;
}
.card-back .socials{
    justify-content:center;
}
.card-back-label{
    font-size:.7rem;
    color:rgba(255,255,255,.3);
    letter-spacing:4px;
    text-transform:uppercase;
    margin-bottom:4px;
}

/* ===== PROFILE ===== */
.profile{
    display:flex;
    align-items:center;
    gap:22px;
}
.pfp{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid rgba(255,255,255,.5);
    box-shadow:0 0 20px rgba(255,255,255,.15);
    transition:.4s;
    background:#111;
    flex-shrink:0;
    cursor:pointer;
    position:relative;
    z-index:3;
}
.card-front:hover .pfp{
    transform:scale(1.08) rotate(-3deg);
    border-color:#fff;
    box-shadow:0 0 30px rgba(255,255,255,.5);
}
.info{ flex:1; min-width:0; }
.info h2{
    color:#fff;
    margin-bottom:6px;
    letter-spacing:4px;
    font-weight:700;
    font-size:1.05rem;
}

/* Status separat unter dem Namen */
.status-row{
    display:block;
    margin-top:2px;
}

.socials{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}
.social-btn{
    display:flex;
    align-items:center;
    gap:8px;
    padding:9px 14px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.12);
    border-radius:10px;
    cursor:pointer;
    transition:all .25s;
    color:#fff;
    font-size:.82rem;
    font-weight:500;
    user-select:none;
}
.social-btn i{ font-size:1rem; }
.social-btn img{width:16px;height:16px;display:block;flex-shrink:0;}
.social-btn:hover{
    background:#fff;
    color:#000;
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(255,255,255,.15);
}

.audio-toggle{
    position:fixed;
    top:20px;
    right:20px;
    width:46px;
    height:46px;
    border-radius:50%;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.15);
    color:#fff;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9998;
    transition:.3s;
    backdrop-filter:blur(8px);
}
.audio-toggle:hover{
    background:#fff;
    color:#000;
}

#toast{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:#fff;
    color:#000;
    border:1px solid rgba(0,0,0,.1);
    padding:12px 20px;
    border-radius:12px;
    opacity:0;
    transition:.3s;
    font-weight:600;
    letter-spacing:1px;
    font-size:.85rem;
    z-index:9999;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
}
#toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
}

.footer{
    margin-top:60px;
    color:rgba(255,255,255,.25);
    font-size:.7rem;
    letter-spacing:4px;
}

/* ===== RESPONSIVE – NUR MOBILE/TABLET ===== */
@media (max-width: 900px){
    .card-face{ padding:20px; }
    .card-flipper{ min-height:160px; }
}

@media (max-width: 600px){
    .card-flipper{ min-height:200px; }

    .card-face{
        text-align:center;
    }

    .card-front .profile{
        flex-direction:column;
        text-align:center;
        gap:10px;
    }

    .card-front .info{
        display:flex;
        flex-direction:column;
        align-items:center;
    }

    .card-front .info h2{
        margin-bottom:2px;
        text-align:center;
    }

    .status-row{
        text-align:center;
        margin-top:4px;
    }

    .card-back .socials{
        flex-direction:column;
        align-items:center;
    }

    .title{ letter-spacing:6px; }
}

/* ===== IMAGE MODAL ===== */
.image-modal{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.92);
    opacity:0;
    visibility:hidden;
    transition:opacity .25s ease, visibility .25s ease;
    z-index:100000;
}
.image-modal.show{
    opacity:1;
    visibility:visible;
}
.modal-image{
    max-width:90vw;
    max-height:90vh;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.15);
    box-shadow:0 0 60px rgba(0,0,0,.8);
    transition:box-shadow .3s ease, transform .3s ease;
}
.image-modal.show .modal-image{
    box-shadow:0 0 35px rgba(255,255,255,.9), 0 0 85px rgba(255,255,255,.5), inset 0 0 40px rgba(255,255,255,.16);
    transform:scale(1.02);
}

.status-dot{
    display:inline-block;
    width:8px;
    height:8px;
    border-radius:50%;
    margin-right:6px;
    vertical-align:middle;
}
.status-dot.online{background:#43b581;box-shadow:0 0 6px #43b581;}
.status-dot.idle{background:#faa61a;box-shadow:0 0 6px #faa61a;}
.status-dot.dnd{background:#f04747;box-shadow:0 0 6px #f04747;}
.status-dot.offline{background:#747f8d;}
.status-text{font-size:.7rem;color:rgba(255,255,255,.4);margin-left:2px;}

.activity-text{
    font-size:.65rem;
    color:rgba(255,255,255,.3);
    margin-top:6px;
    line-height:1.3;
}

/* Partikel */
.particle{
    position:absolute;
    bottom:0;
    background:#fff;
    border-radius:50%;
    animation: floatUp linear infinite;
}
@keyframes floatUp{
    0%{ transform:translateY(0) scale(1); opacity:0; }
    10%{ opacity:1; }
    90%{ opacity:1; }
    100%{ transform:translateY(-100vh) scale(0); opacity:0; }
}
</style>
</head>

<body>

<div id="enter">
    <h1>CLICK TO ENTER</h1>
    <p>sound on recommended</p>
</div>

<div id="site" class="blurred">

<div class="bg"></div>
<div class="grid-layer"></div>
<div class="particles" id="particles"></div>
<div class="lightning"></div>

<button class="audio-toggle" id="audioToggle" title="Toggle music">
    <i class="fa-solid fa-volume-high"></i>
</button>

<div class="container">
    <div class="title">FRIEND GROUP</div>
    <div id="cardsContainer"></div>
    <div class="footer">© FRIEND GROUP</div>
</div>
</div>

<div id="toast">Copied</div>
<div id="imageModal" class="image-modal" aria-hidden="true">
    <img id="modalImage" class="modal-image" src="" alt="Profile image">
</div>

<audio id="music" loop preload="auto"></audio>

<script>
// ============================================================
// >>> DEINE PROFILES - Social-System mit "enabled" <<<
// ============================================================
const PROFILES = [
  {
    userId: "629800496479076352",
    name: "FAYYSI",
    avatar: "https://cdn.discordapp.com/attachments/1506318533217226752/1519487604423262309/458ab107ae9770e16a9d3aca2e09bb6b_1.jpg?ex=6a3dbc9b&is=6a3c6b1b&hm=9ecc1040e809ecd93aa4d619417f24c1441b3c1dd244015fa6fa8b661b6bfb43&",
    isFounder: true,
    discord: { enabled: true, tag: "68rz" },
    telegram: { enabled: false, url: "https://t.me/FAYYSI", username: "@not" },
    roblox: { enabled: true, tag: "Fayysi" }
  },
  {
    userId: "1319734715858550835",
    name: "Layysi",
    avatar: "https://cdn.discordapp.com/avatars/1319734715858550835/fda97d7ec9325b6e907b12c08a616328.png?size=512",
    isFounder: false,
    discord: { enabled: true, tag: "7e9p" },
    telegram: { enabled: true, url: "https://t.me/Layysi", username: "@Layysi" },
    roblox: { enabled: true, tag: "Layysi" }
  },
  {
    userId: "1519379611648131109",
    name: "rootkit",
    avatar: "https://cdn.discordapp.com/attachments/1519724814951252281/1519782023722696844/fdd701338be26f2d6ad979f0914d2e95.jpg?ex=6a3ecece&is=6a3d7d4e&hm=717d25a514f9f01ead42408c6d095234a924d43ff5e618ee71679c238da31b50",
    isFounder: false,
    discord: { enabled: true, tag: "solanaaddy" },
    telegram: { enabled: true, url: "https://t.me/rootkit", username: "@rootkit" },
    roblox: { enabled: false, tag: "not" }
  },
  {
    userId: "1480561930300166196",
    name: "celine",
    avatar: "https://cdn.discordapp.com/avatars/1480561930300166196/198b86d8b1e90e0981b800b077dc51d3.png?size=512",
    isFounder: false,
    discord: { enabled: true, tag: "pureliebe." },
    telegram: { enabled: true, url: "https://t.me/dima1378", username: "@dima1378" },
    roblox: { enabled: true, tag: "pureliebe67" }
  },
  {
    userId: "1374039339306320023",
    name: "𝒮𝒶𝒻𝒾𝓇𝒶",
    avatar: "https://cdn.discordapp.com/avatars/1374039339306320023/860ea73149909be0fd0abf32f92e6121.png?size=512",
    isFounder: false,
    discord: { enabled: true, tag: "4…" },
    telegram: { enabled: false, url: "https://t.me/", username: "@" },
    roblox: { enabled: true, tag: "lightyagamifarmimg" }
  }
];

// ============================================================
// >>> DEINE MUSIK <<<
// ============================================================
const MUSIC_URL = "https://cdn.discordapp.com/attachments/1519724814951252281/1520544539150913677/misery._-_pupsies_-_Topic_320k.mp3?ex=6a4194f4&is=6a404374&hm=feb72b045eacc9f44a7efd00f689e6ceb7365186725989e3e81f2f8e87503ef1&";

// Roblox Icon
const ROBLOX_ICON = "https://cdn.discordapp.com/attachments/1506318533217226752/1519693248766152755/CITYPNG.COMHD_Roblox_White_Symbol_Sign_Icon_Logo_PNG_-_2000x2000.png?ex=6a407661&is=6a3f24e1&hm=90a6f72b939e4cabd356fb4e15b8f51cf435aa98796410244f46626ba9279acb";

// ============ AB HIER NICHTS MEHR ÄNDERN ============

(function(){
const container = document.getElementById('cardsContainer');
container.innerHTML = PROFILES.map(p => {
    const founderBadge = p.isFounder ? '<span style="position:absolute;top:10px;right:10px;font-size:.65rem;opacity:.4;">Founder</span>' : '';

    // Social-Buttons für die Rückseite – nur enabled Plattformen
    let backSocialsHTML = '';

    if (p.discord && p.discord.enabled) {
        backSocialsHTML += `
            <div class="social-btn" onclick="navigator.clipboard.writeText('${p.discord.tag}');showToast('Kopiert: ${p.discord.tag}')">
                <i class="fa-brands fa-discord"></i><span>${p.discord.tag}</span>
            </div>`;
    }

    if (p.roblox && p.roblox.enabled) {
        backSocialsHTML += `
            <div class="social-btn" onclick="navigator.clipboard.writeText('${p.roblox.tag}');showToast('Kopiert: ${p.roblox.tag}')">
                <img src="${ROBLOX_ICON}" style="filter:brightness(0) invert(1);width:16px;height:16px;" onerror="this.style.display='none'"><span>${p.roblox.tag}</span>
            </div>`;
    }

    if (p.telegram && p.telegram.enabled) {
        const tgUrl = p.telegram.url || '#';
        const tgUser = p.telegram.username || 'Telegram';
        backSocialsHTML += `
            <div class="social-btn" onclick="window.open('${tgUrl}','_blank')">
                <i class="fa-brands fa-telegram"></i><span>${tgUser}</span>
            </div>`;
    }

    // Fallback falls alle deaktiviert
    if (!backSocialsHTML) {
        backSocialsHTML = '<span style="color:rgba(255,255,255,.2);font-size:.75rem;">Keine Social-Links</span>';
    }

    return `<div class="card-container" data-userid="${p.userId}">
        <div class="card-flipper" id="flipper-${p.userId}">
            <!-- VORDERSEITE -->
            <div class="card-face card-front" id="front-${p.userId}">
                ${founderBadge}
                <div class="profile">
                    <img class="pfp" id="av-${p.userId}" src="${p.avatar}" onerror="this.src='https://via.placeholder.com/90/111/fff?text=${p.name.charAt(0)}'" alt="${p.name}">
                    <div class="info">
                        <h2>${p.name}</h2>
                        <span class="status-row status-text" id="stx-${p.userId}"><span class="status-dot offline" id="sdot-${p.userId}"></span><span id="stxt-${p.userId}">Lade...</span></span>
                        <div class="activity-text" id="act-${p.userId}" style="display:none;"></div>
                    </div>
                </div>
            </div>
            <!-- RÜCKSEITE -->
            <div class="card-face card-back">
                <div class="card-back-label">Social Links</div>
                <div class="socials">${backSocialsHTML}</div>
            </div>
        </div>
    </div>`;
}).join('');

// ===== INTERAKTIONS-LOGIK =====
// 1) Klick auf PFP = Bild-Modal öffnen
// 2) Klick auf die Karte (nicht auf PFP, nicht auf Social-Buttons) = Flip

document.querySelectorAll('.card-container').forEach(container => {
    const flipper = container.querySelector('.card-flipper');

    container.addEventListener('click', function(e) {
        // Wenn auf das PFP geklickt wurde → Bild-Modal, kein Flip
        if (e.target.classList.contains('pfp')) {
            e.stopPropagation();
            const img = e.target;
            modalImage.src = img.src;
            imageModal.classList.add('show');
            return;
        }

        // Wenn auf einen Social-Button geklickt wurde → nichts tun
        if (e.target.closest('.social-btn')) return;

        // Sonst → Flip
        flipper.classList.toggle('flipped');
    });
});

// Lanyard Status
const ids = PROFILES.map(p => p.userId);

function updateStatus(id){
const sdot = document.getElementById(`sdot-${id}`);
const stxt = document.getElementById(`stxt-${id}`);
const act = document.getElementById(`act-${id}`);
const av = document.getElementById(`av-${id}`);
if(!sdot||!stxt)return;

fetch(`https://api.lanyard.rest/v1/users/${id}`)
.then(r=>r.json()).then(d=>{
if(!d.success){
stxt.textContent = "Offline";
sdot.className = "status-dot offline";
return;
}
const s = d.data.discord_status || "offline";
sdot.className = "status-dot";
if(s==="online"){sdot.classList.add("online");stxt.textContent="Online";}
else if(s==="idle"){sdot.classList.add("idle");stxt.textContent="Abwesend";}
else if(s==="dnd"){sdot.classList.add("dnd");stxt.textContent="Bitte nicht stören";}
else{sdot.classList.add("offline");stxt.textContent="Unsichtbar";}

if(d.data.discord_user&&d.data.discord_user.avatar){
const h=d.data.discord_user.avatar;
const ex=h.startsWith("a_")?"gif":"png";
if(av)av.src=`https://cdn.discordapp.com/avatars/${id}/${h}.${ex}?size=128`;
}

const acts = d.data.activities||[];
let f = null;
for(const a of acts){if(a.type!==4){f=a;break;}}
if(f){
let h = "";
if(f.type===0){h=`${f.name}`;if(f.details)h+=`<br><span style="font-size:10px;opacity:.6;">${f.details}</span>`;if(f.state)h+=`<br><span style="font-size:10px;opacity:.6;">${f.state}</span>`;}
else if(f.type===2){h=`${f.details||"Musik"}<br><span style="font-size:10px;opacity:.6;">${f.state||""}</span>`;}
else{h=f.name;}
act.innerHTML=h;act.style.display="block";
} else {act.style.display="none";}
}).catch(()=>{
stxt.textContent = "Offline";
sdot.className = "status-dot offline";
});
}

ids.forEach(id=>updateStatus(id));
setInterval(()=>ids.forEach(id=>updateStatus(id)),30000);

// ===== MUSIK =====
const music = document.getElementById('music');
const audioToggle = document.getElementById('audioToggle');
let isPlaying = false;

music.src = MUSIC_URL;

document.getElementById("enter").onclick = () => {
document.getElementById("site").classList.remove("blurred");
const enter = document.getElementById("enter");
enter.style.opacity = "0";
setTimeout(()=>enter.style.display="none",700);
music.volume = 0.4;
music.play().then(()=>{
isPlaying = true;
audioToggle.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
}).catch(() => {
console.log("Autoplay blockiert");
});
};

audioToggle.onclick = () => {
if(isPlaying){
music.pause();
audioToggle.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>';
} else {
music.play().catch(()=>{
music.src = MUSIC_URL;
music.load();
music.play().catch(()=>{});
});
audioToggle.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
}
isPlaying = !isPlaying;
};

// ===== PARTICLES =====
const particlesEl = document.getElementById("particles");
for(let i=0; i<60; i++){
const p = document.createElement("div");
p.className = "particle";
p.style.left = Math.random()*100 + "vw";
p.style.animationDuration = (4 + Math.random()*8) + "s";
p.style.animationDelay = (Math.random()*8) + "s";
p.style.opacity = (0.2 + Math.random()*0.6).toString();
p.style.width = p.style.height = (1 + Math.random()*2) + "px";
particlesEl.appendChild(p);
}

// ===== IMAGE MODAL =====
const imageModal = document.getElementById("imageModal");
const modalImage = document.getElementById("modalImage");

imageModal.addEventListener("click", (e)=>{
if(e.target === imageModal) imageModal.classList.remove("show");
});

document.addEventListener("keydown", (e)=>{
if(e.key === "Escape") imageModal.classList.remove("show");
});

window.showToast = function(msg){
const t = document.getElementById("toast");
t.innerText = msg;
t.classList.add("show");
clearTimeout(window._toastT);
window._toastT = setTimeout(()=>t.classList.remove("show"),2000);
};

})();
</script>
</body>

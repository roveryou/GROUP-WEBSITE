<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>68rz</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#000;color:#fff;overflow:hidden;}

#navbar{position:fixed;top:0;left:0;width:100%;padding:15px 25px;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;z-index:9998;}
#navbar .logo{font-size:24px;text-shadow:0 0 15px white;cursor:pointer;transition:0.2s;}
#navbar .logo:hover{text-shadow:0 0 30px white;}

#snow-container,#snow-container-front{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;}
#snow-container{z-index:1;}#snow-container-front{z-index:10;}
.snowflake{position:absolute;top:-10px;color:white;font-size:1.2em;opacity:0.6;animation:fall linear infinite;pointer-events:none;user-select:none;}
@keyframes fall{0%{transform:translateY(-30px) rotate(0deg);opacity:0.6;}100%{transform:translateY(110vh) rotate(360deg);opacity:0.2;}}

#cursor-glow{position:fixed;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.08);filter:blur(60px);pointer-events:none;transform:translate(-50%,-50%);z-index:2;}

#enter{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;z-index:9999;}
#enter h1{font-size:clamp(40px,12vw,100px);text-shadow:0 0 20px white;text-align:center;padding:0 20px;}
#enter p{font-size:clamp(12px,3vw,20px);margin-top:15px;color:#aaa;text-align:center;}

#main{display:none;height:100vh;overflow:auto;padding:80px 25px 25px;text-align:center;position:relative;z-index:3;}
.cards-container{display:flex;flex-wrap:wrap;justify-content:center;align-items:flex-start;gap:30px;max-width:1400px;margin:20px auto;padding:0 20px;}

.card{flex:1 1 380px;max-width:450px;min-width:320px;padding:30px;border-radius:25px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(15px);transition:0.3s ease;position:relative;z-index:5;}
.card:hover{box-shadow:0 0 30px rgba(255,255,255,0.15);background:rgba(255,255,255,.1);transform:translateY(-3px);}
.profile-header{display:flex;align-items:flex-start;gap:20px;margin-bottom:15px;}

/* ===== AVATAR-BEREICH (komplett: Bild + Name + Status + Buttons) ===== */
.avatar-wrapper{
  position:relative;
  flex-shrink:0;
  z-index:15;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}
.avatar{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid white;
  cursor:pointer;
  display:block;
}
.founder-badge{
  position:absolute;
  top:-15px;
  left:-8px;
  background:#000;
  color:#fff;
  font-size:10px;
  font-weight:bold;
  padding:3px 10px;
  border-radius:12px;
  border:2px solid #000;
  white-space:nowrap;
  z-index:20;
}
.avatar-name{
  font-size:18px;
  font-weight:bold;
  color:white;
  text-align:center;
  width:100%;
}
.avatar-status{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  font-size:12px;
  padding:4px 10px;
  border-radius:14px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  width:100%;
}
.avatar-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.avatar-status-dot.online{background:#43b581;box-shadow:0 0 8px #43b581;}
.avatar-status-dot.idle{background:#faa61a;box-shadow:0 0 8px #faa61a;}
.avatar-status-dot.dnd{background:#f04747;box-shadow:0 0 8px #f04747;}
.avatar-status-dot.offline{background:#747f8d;}
.avatar-activity{
  font-size:11px;
  color:#ccc;
  padding:4px 10px;
  border-radius:8px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);
  width:100%;
  text-align:center;
  line-height:1.4;
}

/* ===== SOCIAL-BUTTONS UNTER DEM AVATAR ===== */
.avatar-socials{
  display:flex;
  gap:6px;
  margin-top:4px;
  width:auto;
}
.avatar-social-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding:8px 12px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
  font-size:14px;
  color:white;
  white-space:nowrap;
}
.avatar-social-btn:hover{
  background:rgba(255,255,255,.15);
  border-color:white;
  box-shadow:0 0 10px rgba(255,255,255,0.2);
}
.avatar-social-btn img{width:18px;height:18px;display:block;flex-shrink:0;}
.avatar-social-btn i{font-size:18px;color:white;flex-shrink:0;}

.profile-info{flex:1;text-align:left;position:relative;z-index:15;display:none;}

@media(max-width:768px){
#navbar .logo{font-size:18px;}
#main{padding:70px 15px 15px;}
.cards-container{flex-direction:column;align-items:center;gap:20px;padding:0;}
.card{flex:unset;width:100%;max-width:400px;min-width:unset;padding:20px;}
.profile-header{flex-direction:column;align-items:center;gap:12px;}
.avatar{width:100px;height:100px;}
.avatar-name{font-size:16px;}
.avatar-status{font-size:11px;padding:3px 8px;}
.avatar-activity{font-size:10px;}
.avatar-social-btn{padding:6px 8px;font-size:12px;}
.avatar-social-btn img{width:15px;height:15px;}
.avatar-social-btn i{font-size:15px;}
}

/* ===== MUSIK-ICON OBEN IN DER NAVBAR (links) ===== */
#musicBtn{
  position:fixed;
  top:10px;
  left:15px;
  z-index:10000;
  width:40px;
  height:40px;
  padding:0;
  background:transparent;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  outline:none;
}
#musicBtn img{width:28px;height:28px;border-radius:4px;}

#main::-webkit-scrollbar{width:6px;}
#main::-webkit-scrollbar-track{background:transparent;}
#main::-webkit-scrollbar-thumb{background:rgba(255,255,255,.3);border-radius:3px;}
</style>
</head>
<body>

<div id="snow-container"></div>
<div id="snow-container-front"></div>
<div id="cursor-glow"></div>

<div id="enter"><h1>CLICK TO ENTER</h1><p>sound on recommended</p></div>

<audio id="music" loop><source src="music.mp3" type="audio/mpeg"></audio>

<button id="musicBtn"><img id="musicIcon" src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/spotify.svg" style="filter:invert(1);width:28px;height:28px;"></button>

<div id="navbar"><div class="logo" onclick="document.getElementById('main').scrollTo({top:0,behavior:'smooth'})">FRIEND GROUP</div></div>

<div id="main"><div class="cards-container"></div></div>

<script>
// ============================================================
// >>> NEUE FREUNDE HINZUFÜGEN <<<
// Nach jedem { ... } ein KOMMA setzen (außer beim LETZTEN)
// ============================================================
const PROFILES = [
  {userId:"629800496479076352",name:"FAYYSI",avatar:"https://cdn.discordapp.com/attachments/1506318533217226752/1519487604423262309/458ab107ae9770e16a9d3aca2e09bb6b_1.jpg?ex=6a3dbc9b&is=6a3c6b1b&hm=9ecc1040e809ecd93aa4d619417f24c1441b3c1dd244015fa6fa8b661b6bfb43&",isFounder:true,telegram:"https://t.me/FAYYSI",telegramUser:"not",discord:{tag:"68rz",label:"Discord"},roblox:{tag:"Fayysi",label:"Roblox"}},
  {userId:"1319734715858550835",name:"Layysi",avatar:"https://cdn.discordapp.com/avatars/1319734715858550835/fda97d7ec9325b6e907b12c08a616328.png?size=512",isFounder:false,telegram:"https://t.me/Layysi",telegramUser:"not",discord:{tag:"7e9p",label:"Discord"},roblox:{tag:"Layysi",label:"Roblox"}},
  {userId:"1519379611648131109",name:"rootkit",avatar:"https://cdn.discordapp.com/attachments/1519724814951252281/1519782023722696844/fdd701338be26f2d6ad979f0914d2e95.jpg?ex=6a3ecece&is=6a3d7d4e&hm=717d25a514f9f01ead42408c6d095234a924d43ff5e618ee71679c238da31b50",isFounder:false,telegram:"https://t.me/rootkit",telegramUser:"@rootkit",discord:{tag:"solanaaddy",label:"Discord"},roblox:{tag:"not",label:"Roblox"}},
  {userId:"1480561930300166196",name:"celine",avatar:"https://cdn.discordapp.com/avatars/1480561930300166196/198b86d8b1e90e0981b800b077dc51d3.png?size=512",isFounder:false,telegram:"https://t.me/dima1378",telegramUser:"@dima1378",discord:{tag:"pureliebe",label:"Discord"},roblox:{tag:"pureliebe67",label:"Roblox"}},
  {userId:"1374039339306320023",name:"𝒮𝒶𝒻𝒾𝓇𝒶",avatar:"https://cdn.discordapp.com/avatars/1374039339306320023/860ea73149909be0fd0abf32f92e6121.png?size=512",isFounder:false,telegram:"https://t.me/",telegramUser:"@",discord:{tag:"4…",label:"Discord"},roblox:{tag:"lightyagamifarmimg",label:"Roblox"}},
  ];

// ============ AB HIER NICHTS MEHR ÄNDERN ============
(function(){
localStorage.setItem('profiles', JSON.stringify(PROFILES));
const c = document.querySelector('.cards-container');
c.innerHTML = PROFILES.map(p => {
const b = p.isFounder ? '<div class="founder-badge">FOUNDER</div>' : '';
const tgLink = p.telegram ? p.telegram : '#';
const tgUser = p.telegramUser ? p.telegramUser : 'Telegram';
return `<div class="card" data-userid="${p.userId}"><div class="profile-header"><div class="avatar-wrapper"><img class="avatar" id="av-${p.userId}" src="${p.avatar}">${b}<div class="avatar-name">${p.name}</div><div class="avatar-status" id="ast-${p.userId}"><div class="avatar-status-dot offline" id="adot-${p.userId}"></div><span id="atx-${p.userId}">Lade Status...</span></div><div class="avatar-activity" id="aac-${p.userId}" style="display:none;"></div><div class="avatar-socials"><div class="avatar-social-btn" onclick="navigator.clipboard.writeText('${p.discord.tag}');alert('Kopiert: ${p.discord.tag}')"><i class="fa-brands fa-discord"></i> ${p.discord.tag}</div><div class="avatar-social-btn" onclick="navigator.clipboard.writeText('${p.roblox.tag}');alert('Kopiert: ${p.roblox.tag}')"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/roblox.svg" style="filter:invert(1);width:18px;height:18px;"> ${p.roblox.tag}</div><div class="avatar-social-btn" onclick="window.open('${tgLink}','_blank')"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg" style="filter:invert(1);width:18px;height:18px;"> ${tgUser}</div></div></div></div></div>`;
}).join('');

const ids = PROFILES.map(p => p.userId);

function update(id){
const adot=document.getElementById(`adot-${id}`),atx=document.getElementById(`atx-${id}`),aac=document.getElementById(`aac-${id}`),av=document.getElementById(`av-${id}`);
if(!adot||!atx||!aac)return;
fetch(`https://api.lanyard.rest/v1/users/${id}`).then(r=>r.json()).then(d=>{
if(!d.success){atx.textContent="Unsichtbar";adot.className="avatar-status-dot offline";return;}
const s=d.data.discord_status||"offline";
adot.className="avatar-status-dot";
if(s==="online"){adot.classList.add("online");atx.textContent="Online";}
else if(s==="idle"){adot.classList.add("idle");atx.textContent="Abwesend";}
else if(s==="dnd"){adot.classList.add("dnd");atx.textContent="Bitte nicht stören";}
else{adot.classList.add("offline");atx.textContent="Unsichtbar";}
if(d.data.discord_user&&d.data.discord_user.avatar){const h=d.data.discord_user.avatar,ex=h.startsWith("a_")?"gif":"png";if(av)av.src=`https://cdn.discordapp.com/avatars/${id}/${h}.${ex}?size=128`;}
const acts=d.data.activities||[];let f=null;for(const a of acts){if(a.type!==4){f=a;break;}}
if(f){let h="";if(f.type===0){h=`${f.name}`;if(f.details)h+=`<br><span style="font-size:10px;color:#999;">${f.details}</span>`;if(f.state)h+=`<br><span style="font-size:10px;color:#999;">${f.state}</span>`;}else if(f.type===2){h=`${f.details||"Musik"}<br><span style="font-size:10px;color:#999;">${f.state||""}</span>`;}else if(f.type===3){h=`${f.name}`;}else{h=f.name;}aac.innerHTML=h;aac.style.display="block";}else{aac.style.display="none";}
}).catch(()=>{atx.textContent="Unsichtbar";adot.className="avatar-status-dot offline";});
}
ids.forEach(id=>update(id));
setInterval(()=>ids.forEach(id=>update(id)),30000);

[document.getElementById('snow-container'),document.getElementById('snow-container-front')].forEach(cn=>{
const f=['❄','❅','❆','✦','•'];
for(let i=0;i<40;i++){const e=document.createElement('div');e.className='snowflake';e.textContent=f[Math.floor(Math.random()*f.length)];e.style.left=Math.random()*100+'%';e.style.fontSize=(Math.random()*1.5+0.5)+'em';e.style.opacity=Math.random()*0.5+0.3;e.style.animationDuration=(Math.random()*8+5)+'s';e.style.animationDelay=(Math.random()*10)+'s';cn.appendChild(e);}
});

// Musik-Status beim Laden wiederherstellen
const savedState=localStorage.getItem('musicState');
if(savedState==='paused'){
  document.getElementById('musicIcon').src='https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/spotify.svg';
}
})();

document.addEventListener("mousemove",e=>{document.getElementById("cursor-glow").style.left=e.clientX+"px";document.getElementById("cursor-glow").style.top=e.clientY+"px";});
document.getElementById("enter").onclick=()=>{
  document.getElementById("enter").style.display="none";
  document.getElementById("main").style.display="block";
  document.getElementById("music").play();
  document.getElementById("musicIcon").src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/spotify.svg";
  localStorage.setItem('musicState','playing');
};
document.getElementById("musicBtn").onclick=()=>{
  const m=document.getElementById("music"),i=document.getElementById("musicIcon");
  const iconUrl="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/spotify.svg";
  if(m.paused){
    m.play();
    i.src=iconUrl;
    localStorage.setItem('musicState','playing');
  } else {
    m.pause();
    i.src=iconUrl;
    localStorage.setItem('musicState','paused');
  }
};
document.addEventListener("click",e=>{if(e.target.classList.contains("avatar")&&e.target.src)window.open(e.target.src,"_blank");});
</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>68rz</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
background:#000;
color:#fff;
overflow:hidden;
}

/* ===== SCHNEE FLAKES ===== */
#snow-container{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
}

.snowflake{
position:absolute;
top:-10px;
color:white;
font-size:1.2em;
opacity:0.6;
animation:fall linear infinite;
pointer-events:none;
user-select:none;
}

@keyframes fall{
0%{transform:translateY(-30px) rotate(0deg); opacity:0.6;}
100%{transform:translateY(110vh) rotate(360deg); opacity:0.2;}
}

#cursor-glow{
position:fixed;
width:180px;
height:180px;
border-radius:50%;
background:rgba(255,255,255,.08);
filter:blur(60px);
pointer-events:none;
transform:translate(-50%,-50%);
z-index:2;
}

#enter{
position:fixed;
inset:0;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
z-index:999;
}

#enter h1{
font-size:clamp(40px, 12vw, 100px);
text-shadow:0 0 20px white;
text-align:center;
padding:0 20px;
}

#enter p{
font-size:clamp(12px, 3vw, 20px);
margin-top:15px;
color:#aaa;
text-align:center;
}

#main{
display:none;
height:100vh;
overflow:auto;
padding:25px;
text-align:center;
position:relative;
z-index:3;
}

.logo{
font-size:42px;
margin:20px 0;
text-shadow:0 0 20px white;
padding-left:60px;
}

.card{
width:350px;
max-width:95%;
margin:25px auto;
padding:25px;
border-radius:25px;
background:rgba(255,255,255,.07);
border:1px solid rgba(255,255,255,.15);
backdrop-filter:blur(15px);
}

.avatar-wrapper{
position:relative;
display:inline-block;
margin:0 auto;
}

.avatar{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
cursor:pointer;
display:block;
}

.founder-badge{
position:absolute;
top:-8px;
left:-8px;
background:#000;
color:#fff;
font-size:10px;
font-weight:bold;
padding:3px 10px;
border-radius:12px;
border:2px solid #fff;
white-space:nowrap;
z-index:2;
box-shadow:0 0 8px rgba(255,255,255,0.3);
}

/* Discord Status */
.discord-status{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
margin:8px 0;
font-size:14px;
padding:6px 14px;
border-radius:20px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
}

.status-dot{
width:10px;
height:10px;
border-radius:50%;
flex-shrink:0;
}

.status-dot.online{background:#43b581;box-shadow:0 0 10px #43b581;}
.status-dot.idle{background:#faa61a;box-shadow:0 0 10px #faa61a;}
.status-dot.dnd{background:#f04747;box-shadow:0 0 10px #f04747;}
.status-dot.offline{background:#747f8d;}

.discord-activity{
font-size:13px;
color:#ccc;
margin-top:4px;
padding:8px 14px;
border-radius:12px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
line-height:1.5;
}

/* ===== SOCIAL BUTTONS (wie dein Beispiel) ===== */
.social-btn{
width:100%;
padding:12px;
margin-top:10px;
background:#111;
color:white;
border:1px solid #444;
border-radius:12px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
font-size:14px;
transition:0.2s;
}

.social-btn:hover{
box-shadow:0 0 20px white;
}

.social-btn i{
font-size:20px;
width:22px;
text-align:center;
}

.social-btn .label{
font-weight:bold;
}

.social-btn .handle{
color:#aaa;
}

#musicBtn{
position:fixed;
top:15px;
left:15px;
z-index:9999;
width:50px;
height:50px;
padding:0;
background:#111;
color:white;
border:1px solid #444;
border-radius:12px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

#musicBtn img{
width:32px;
height:32px;
border-radius:4px;
}

/* Scrollbar */
#main::-webkit-scrollbar{
width:6px;
}
#main::-webkit-scrollbar-track{
background:transparent;
}
#main::-webkit-scrollbar-thumb{
background:rgba(255,255,255,.3);
border-radius:3px;
}
</style>
</head>
<body>

<div id="cursor-glow"></div>

<div id="enter">
<h1>CLICK TO ENTER</h1>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">

</button>

<div id="main">
<h1 class="logo">COMBOSS FRIEND GROUP</h1>

<div class="avatar-wrapper">
<img class="avatar" id="avatar-629800496479076352" src="https://cdn.discordapp.com/attachments/1506318533217226752/1519487604423262309/458ab107ae9770e16a9d3aca2e09bb6b_1.jpg?ex=6a3dbc9b&is=6a3c6b1b&hm=9ecc1040e809ecd93aa4d619417f24c1441b3c1dd244015fa6fa8b661b6bfb43&">
<div class="founder-badge">FOUNDER</div>
</div>

<div class="discord-status" id="status-629800496479076352">

<span id="text-629800496479076352">Lade Status...</span>
</div>
<div class="discord-activity" id="activity-629800496479076352" style="display:none;"></div>

<img class="avatar" id="avatar-1319734715858550835" src="https://cdn.discordapp.com/avatars/1319734715858550835/fda97d7ec9325b6e907b12c08a616328.png?size=512">
</div>

<script>
// ===== SCHNEE FLAKES =====
function createSnowflakes(){
const container = document.getElementById('snow-container');
const flakes = ['❄','❅','❆','✦','•'];
for(let i=0; i<80; i++){
const flake = document.createElement('div');
flake.className = 'snowflake';
flake.textContent = flakes[Math.floor(Math.random()*flakes.length)];
flake.style.left = Math.random()*100+'%';
flake.style.fontSize = (Math.random()*1.5+0.5)+'em';
flake.style.opacity = Math.random()*0.5+0.3;
flake.style.animationDuration = (Math.random()*8+5)+'s';
flake.style.animationDelay = (Math.random()*10)+'s';
container.appendChild(flake);
}
}
createSnowflakes();

// ===== CURSOR GLOW =====
document.addEventListener("mousemove",(e)=>{
const glow=document.getElementById("cursor-glow");
glow.style.left=e.clientX+"px";
glow.style.top=e.clientY+"px";
});

// ===== ENTER SCREEN =====
const enter=document.getElementById("enter");
const main=document.getElementById("main");
const music=document.getElementById("music");
const musicBtn=document.getElementById("musicBtn");
const musicIcon=document.getElementById("musicIcon");

enter.onclick=()=>{
enter.style.display="none";
main.style.display="block";
music.play();
musicIcon.src="https://cdn.discordapp.com/attachments/1506318533217226752/1519616016361984120/lautsprecher_2.png?ex=6a3e3433&is=6a3ce2b3&hm=358d45588b016226dae272b94e373766b77c4631668fbeb1802659ff79ad8626&";
};

// ===== COPY TEXT (über data-copy Attribut) =====
document.addEventListener("click",(e)=>{
const btn = e.target.closest(".social-btn");
if(btn && btn.dataset.copy){
navigator.clipboard.writeText(btn.dataset.copy);
alert("Kopiert: "+btn.dataset.copy);
}
});

// ===== MUSIC TOGGLE =====
musicBtn.onclick=()=>{
if(music.paused){
music.play();
musicIcon.src="https://cdn.discordapp.com/attachments/1506318533217226752/1519616016361984120/lautsprecher_2.png?ex=6a3e3433&is=6a3ce2b3&hm=358d45588b016226dae272b94e373766b77c4631668fbeb1802659ff79ad8626&";
}else{
music.pause();
musicIcon.src="https://cdn.discordapp.com/attachments/1506318533217226752/1519615974465343488/lautsprecher.png?ex=6a3e3429&is=6a3ce2a9&hm=c1937dd4ef02deddffdc477c4d1c2ef4d6c5f9ce6c55fa8a50dfb885566c9c45&";
}
};

// ===== AVATAR ZOOM =====
document.addEventListener("click",(e)=>{
if(e.target.classList.contains("avatar")){
const src = e.target.src;
if(src) window.open(src, "_blank");
}
});

// ===== DISCORD LIVE STATUS =====
function updateUserStatus(userId) {
const statusEl = document.getElementById(`status-${userId}`);
const textEl = document.getElementById(`text-${userId}`);
const activityEl = document.getElementById(`activity-${userId}`);
const avatarEl = document.getElementById(`avatar-${userId}`);

if(!statusEl || !textEl || !activityEl) return;

fetch(`https://api.lanyard.rest/v1/users/${userId}`)
.then(r => r.json())
.then(data => {
if(!data.success) {
textEl.textContent = "Unsichtbar";
statusEl.querySelector(".status-dot").className = "status-dot offline";
return;
}

const d = data.data;
const dot = statusEl.querySelector(".status-dot");

const status = d.discord_status || "offline";
dot.className = "status-dot";
if(status === "online") {
dot.classList.add("online");
textEl.textContent = "Online";
} else if(status === "idle") {
dot.classList.add("idle");
textEl.textContent = "Abwesend";
} else if(status === "dnd") {
dot.classList.add("dnd");
textEl.textContent = "Bitte nicht stören";
} else {
dot.classList.add("offline");
textEl.textContent = "Unsichtbar";
}

if(d.discord_user && d.discord_user.avatar) {
const hash = d.discord_user.avatar;
const ext = hash.startsWith("a_") ? "gif" : "png";
const avatarUrl = `https://cdn.discordapp.com/avatars/${userId}/${hash}.${ext}?size=128`;
if(avatarEl) avatarEl.src = avatarUrl;
}

const activities = d.activities || [];
let found = null;
for(const act of activities) {
if(act.type !== 4) { found = act; break; }
}

if(found) {
let html = "";
if(found.type === 0) {
html = `Spielt: ${found.name}`;
if(found.details) html += `<br><span style="font-size:12px;color:#999;">${found.details}</span>`;
if(found.state) html += `<br><span style="font-size:12px;color:#999;">${found.state}</span>`;
} else if(found.type === 2) {
const song = found.details || "Unbekannt";
const artist = found.state || "Unbekannt";
html = `Hört: ${song}<br><span style="font-size:12px;color:#999;">von ${artist}</span>`;
} else if(found.type === 3) {
html = `Schaut: ${found.name}`;
} else {
html = found.name;
}
activityEl.innerHTML = html;
activityEl.style.display = "block";
} else {
activityEl.style.display = "none";
}
})
.catch(() => {
textEl.textContent = "Unsichtbar";
statusEl.querySelector(".status-dot").className = "status-dot offline";
});
}

const USER_IDS = [
"629800496479076352",
"1319734715858550835"
];

USER_IDS.forEach(id => updateUserStatus(id));

setInterval(() => {
USER_IDS.forEach(id => updateUserStatus(id));
}, 30000);
</script>

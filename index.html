<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>68rz</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
background:#000;
color:#fff;
overflow:hidden;
}

#stars{
position:fixed;
width:100%;
height:100%;
background-image:radial-gradient(white 1px,transparent 1px);
background-size:40px 40px;
animation:stars 25s linear infinite;
opacity:.4;
}

@keyframes stars{
from{transform:translateY(0);}
to{transform:translateY(-500px);}
}

#cursor-glow{
position:fixed;
width:180px;
height:180px;
border-radius:50%;
background:rgba(255,255,255,.08);
filter:blur(60px);
pointer-events:none;
transform:translate(-50%,-50%);
}

#enter{
position:fixed;
inset:0;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
z-index:999;
}

#enter h1{
font-size:clamp(40px, 12vw, 100px);
text-shadow:0 0 20px white;
text-align:center;
padding:0 20px;
}

#enter p{
font-size:clamp(12px, 3vw, 20px);
margin-top:15px;
color:#aaa;
text-align:center;
}

#main{
display:none;
height:100vh;
overflow:auto;
padding:25px;
text-align:center;
}

.logo{
font-size:42px;
margin:20px 0;
text-shadow:0 0 20px white;
padding-left:60px;
}

.card{
width:350px;
max-width:95%;
margin:25px auto;
padding:25px;
border-radius:25px;
background:rgba(255,255,255,.07);
border:1px solid rgba(255,255,255,.15);
backdrop-filter:blur(15px);
}

.avatar-wrapper{
position:relative;
display:inline-block;
margin:0 auto;
}

.avatar{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
cursor:pointer;
display:block;
}

.founder-badge{
position:absolute;
top:-8px;
left:-8px;
background:#000;
color:#fff;
font-size:10px;
font-weight:bold;
padding:3px 10px;
border-radius:12px;
border:2px solid #fff;
white-space:nowrap;
z-index:2;
box-shadow:0 0 8px rgba(255,255,255,0.3);
}

.btn{
width:100%;
padding:12px;
margin-top:10px;
background:#111;
color:white;
border:1px solid #444;
border-radius:12px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.btn:hover{
box-shadow:0 0 20px white;
}

.icon{
width:22px;
height:22px;
border-radius:6px;
}

#musicBtn{
position:fixed;
top:15px;
left:15px;
z-index:9999;
width:50px;
height:50px;
padding:0;
background:#111;
color:white;
border:1px solid #444;
border-radius:12px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

#musicBtn img{
width:32px;
height:32px;
border-radius:4px;
}

/* Scrollbar für Handy */
#main::-webkit-scrollbar{
width:6px;
}

#main::-webkit-scrollbar-track{
background:transparent;
}

#main::-webkit-scrollbar-thumb{
background:rgba(255,255,255,.3);
border-radius:3px;
}
</style>
</head>
<body>
<div id="stars"></div>
<div id="cursor-glow"></div>

<!-- ENTER BEREICH -->
<div id="enter">
<h1>CLICK TO ENTER</h1>
<p>sound on recommended</p>
</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<!-- MUSIK BUTTON – oben links -->
<button id="musicBtn">
<img id="musicIcon" src="https://cdn.discordapp.com/attachments/1506318533217226752/1519615974465343488/lautsprecher.png?ex=6a3e3429&is=6a3ce2a9&hm=c1937dd4ef02deddffdc477c4d1c2ef4d6c5f9ce6c55fa8a50dfb885566c9c45&">
</button>

<div id="main">
<h1 class="logo">COMBOSS FRIEND GROUP</h1>

<!-- FAYYSI Card – NUR HIER das Founder Badge -->
<div class="card">
<div class="avatar-wrapper">
<img class="avatar" src="https://cdn.discordapp.com/attachments/1506318533217226752/1519487604423262309/458ab107ae9770e16a9d3aca2e09bb6b_1.jpg?ex=6a3dbc9b&is=6a3c6b1b&hm=9ecc1040e809ecd93aa4d619417f24c1441b3c1dd244015fa6fa8b661b6bfb43&">
<div class="founder-badge">FOUNDER</div>
</div>
<h2>FAYYSI</h2>
<button class="btn" onclick="copyText('68rz')">
<img class="icon" src="https://cdn.discordapp.com/attachments/1506318533217226752/1519486310283214914/logo.png?ex=6a3dbb67&is=6a3c69e7&hm=91663aaf63084ac9b8e32a4632362c44ba7115b8bf116a897e4a88f107e682e1&">
Discord: 68rz
</button>
<button class="btn" onclick="copyText('Fayysi')">
<img class="icon" src="https://cdn.discordapp.com/attachments/1506318533217226752/1519486307347206204/roblox.png?ex=6a3dbb66&is=6a3c69e6&hm=4f9dc889d37ca76efb6934b7918774071a1cd69b52fe05deaa776bcb75bd4e7b&">
Roblox: Fayysi
</button>
</div>

<!-- LAYYSI Card – OHNE Founder Badge -->
<div class="card">
<h2>LAYYSI</h2>
<p>sklave</p>
<p>Später hinzufügen</p>
</div>
</div>

<script>
const enter=document.getElementById("enter");
const main=document.getElementById("main");
const music=document.getElementById("music");
const musicBtn=document.getElementById("musicBtn");
const musicIcon=document.getElementById("musicIcon");

// Maus-Glow
document.addEventListener("mousemove",(e)=>{
const glow=document.getElementById("cursor-glow");
glow.style.left=e.clientX+"px";
glow.style.top=e.clientY+"px";
});

// ENTER klicken
enter.onclick=()=>{
enter.style.display="none";
main.style.display="block";
music.play();
musicIcon.src="https://cdn.discordapp.com/attachments/1506318533217226752/1519616016361984120/lautsprecher_2.png?ex=6a3e3433&is=6a3ce2b3&hm=358d45588b016226dae272b94e373766b77c4631668fbeb1802659ff79ad8626&";
};

// Kopieren
function copyText(text){
navigator.clipboard.writeText(text);
alert("Kopiert: "+text);
}

// Musik Button
musicBtn.onclick=()=>{
if(music.paused){
music.play();
musicIcon.src="https://cdn.discordapp.com/attachments/1506318533217226752/1519616016361984120/lautsprecher_2.png?ex=6a3e3433&is=6a3ce2b3&hm=358d45588b016226dae272b94e373766b77c4631668fbeb1802659ff79ad8626&";
}else{
music.pause();
musicIcon.src="https://cdn.discordapp.com/attachments/1506318533217226752/1519615974465343488/lautsprecher.png?ex=6a3e3429&is=6a3ce2a9&hm=c1937dd4ef02deddffdc477c4d1c2ef4d6c5f9ce6c55fa8a50dfb885566c9c45&";
}
};

// BILDER ANKLICKBAR
document.addEventListener("click",(e)=>{
if(e.target.classList.contains("avatar")){
const src = e.target.src;
if(src){
window.open(src, "_blank");
}
}
});
</script>
</body>
</html>
